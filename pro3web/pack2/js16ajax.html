<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax</title>
    <script>
        window.onload = () => {
            document.querySelector("#btnGet").onclick = getFunc;
            document.querySelector("#btnPost").onclick = postFunc;
        }
        /*Ajax 기본 명령어 : https://cafe.daum.net/flowlife/HqLj/38*/
        let xhr;
        
        function getFunc(){
            let irum = frm.name.value;
            let nai = frm.age.value;
            // alert(irum + " " + nai);
            // 전통적인 방식 open -> onreadystatechange -> send : 현장에서 안씀.(교육용 원리알기좋다.)
            xhr = new XMLHttpRequest();                     // 서버와 Ajax 통신용 클래스
            let fname = "js.py?irum="+irum+ "&nai=" + nai;  //query string
            xhr.open("GET", fname, true);                   // true면 비동기방식, false면 동기방식 
            xhr.onreadystatechange = function(){
                if(xhr.readyState === 4 && xhr.status === 200){
                    process1();
                }
            }
            xhr.send();
        }
        
        function process1(){
            alert(xhr.responseText);
        }
        
        function postFunc(){

        }
    </script>
</head>
<body>
    <h2>Ajax 이해 : get, post</h2>
    <form name="frm">
        이름 : <input type="text" name="name" value="tom"><br>
        나이 : <input type="text" name="age" value="33"><br>
        <input type="button" value="get 방식" id="btnGet">
        <input type="button" value="post 방식" id="btnPost">
    </form>
</body>
</html>
