<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>피마 인디언 당뇨병 예측</title>
</head>

<body>

<div class="container">
    <h2>당뇨병 예측 시스템</h2>
    <form id="diabetesForm">
    <table>
        <tr>
            <td><label>임신 횟수 Pregnancies</label></td>
            <td><input type="number" step="any" id="pregnancies" required></td>
        </tr>
            <td><label>포도당 수치 Glucose</label></td>
            <td><input type="number" step="any" id="glucose" required></td>
        <tr>
            <td><label>혈압 BloodPressure</label></td>
            <td><input type="number" step="any" id="blood_pressure" required></td>
        </tr>
        <tr>
            <td><label>피하지방 두께 SkinThickness</label></td>
            <td><input type="number" step="any" id="skin_thickness" required></td>
        </tr>
        <tr>
            <td><label>인슐린 Insulin</label></td>
            <td><input type="number" step="any" id="insulin" required></td>     
        </tr>
        <tr>
            <td><label>BMI</label></td>
            <td><input type="number" step="any" id="bmi" required></td>
        </tr>
        <tr>
            <td><label>당뇨 내력 가중치 DiabetesPedigreeFunction</label></td>
            <td><input type="number" step="any" id="diabetes_pedigree" required></td>
        </tr>
        <tr>
            <td><label>나이 Age</label></td>
            <td><input type="number" step="any" id="age" required></td>     
        </tr>
    </table>    
        <br>
        <button type="submit">예측하기</button>
        <br>
        </form>
    
    <div class="result-box" id="resultBox">
        <p id="resultText"></p>
        <p id="probText"></p>
    </div>
</div>

<script>
    document.getElementById("diabetesForm").addEventListener("submit", function(event) {
        event.preventDefault();

        // 입력값을 JavaScript 객체로 생성
        const inputData = {
            pregnancies: document.getElementById("pregnancies").value,
            glucose: document.getElementById("glucose").value,
            blood_pressure: document.getElementById("blood_pressure").value,
            skin_thickness: document.getElementById("skin_thickness").value,
            insulin: document.getElementById("insulin").value,
            bmi: document.getElementById("bmi").value,
            diabetes_pedigree: document.getElementById("diabetes_pedigree").value,
            age: document.getElementById("age").value
        };

        // Flask의 /predict 주소로 Ajax 요청
        fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(inputData)
        })
        .then(response => response.json())
        .then(data => {
            const resultBox = document.getElementById("resultBox");
            const resultText = document.getElementById("resultText");
            const probText = document.getElementById("probText");

            resultBox.style.display = "block";

            if (data.status === "success") {
                resultText.className = "success";
                resultText.innerText = "판정 결과: " + data.result.message;
                probText.innerText = "예측 확률: " + data.result.probability;
            } else {
                resultText.className = "error";
                resultText.innerText = "오류 발생: " + data.message;
                probText.innerText = "";
            }
        })
        .catch(error => {
            const resultBox = document.getElementById("resultBox");
            const resultText = document.getElementById("resultText");
            const probText = document.getElementById("probText");

            resultBox.style.display = "block";
            resultText.className = "error";
            resultText.innerText = "Ajax 요청 오류: " + error;
            probText.innerText = "";
        });
    });
</script>

</body>
</html>
